name: Request Copilot Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  request-copilot-review:
    # Skip draft PRs and PRs from forks (secrets are unavailable for forks)
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Validate COPILOT_USER_PAT secret
        env:
          TOKEN: ${{ secrets.COPILOT_USER_PAT }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::COPILOT_USER_PAT secret is not set. Add a fine-grained PAT with 'Pull requests: Read and write' permission from a Copilot-licensed user."
            exit 1
          fi
          # Always perform a deterministic check: fail unless HTTP 200
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/user)
          if [ "$response" != "200" ]; then
            echo "::error::COPILOT_USER_PAT is invalid or expired (HTTP $response). Please regenerate the PAT and update the secret."
            exit 1
          fi
          echo "Token validated (HTTP $response)"

      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.COPILOT_USER_PAT }}
        run: |
          # Use the reviewer username 'Copilot' (bot user ID 175728472) which
          # is what the GitHub UI submits to /pull/{n}/review-requests.
          # This produces proper inline review comments, unlike @copilot comment trigger.
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            -X POST \
            --input - <<< '{"reviewers":["Copilot"]}'
