<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Group Manager</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #475569;
            background-color: #334155;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            ring: 2px solid var(--accent-color);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: var(--accent-hover);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .logs {
            margin-top: 1.5rem;
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.875rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .hidden {
            display: none;
        }
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Security Group Manager</h1>
        <!-- Login View -->
        <div id="loginView" class="hidden">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password"
                    style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #475569; background-color: #334155; color: white; font-size: 1rem; box-sizing: border-box;" />
            </div>
            <button id="loginBtn" onclick="handleLogin()">Login</button>
            <div id="loginError" style="color: var(--error-color); margin-top: 1rem; display: none;"></div>
        </div>
        
        <!-- Main View -->
        <div id="mainView" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <span id="welcomeMsg" style="font-size: 0.875rem; color: #94a3b8;"></span>
                <button onclick="handleLogout()"
                    style="width: auto; padding: 0.5rem 1rem; font-size: 0.875rem; background-color: #ef4444;">Logout</button>
            </div>

            <div class="form-group">
                <label for="ip">Current IP Address</label>
                <input type="text" id="ip" placeholder="Loading IP..." />
            </div>
            <div class="form-group">
                <label for="group">Group Name</label>
                <select id="group"
                    style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #475569; background-color: #334155; color: white; font-size: 1rem; box-sizing: border-box;">
                    <option value="" disabled selected>Select a group</option>
                </select>
            </div>
            <button id="submitBtn" onclick="submitUpdate()">Update Rules</button>
            
            <div id="logsContainer" class="logs hidden">
                <div id="logsContent"></div>
            </div>
            </div>
    </div>

    <script>
                const loginView = document.getElementById('loginView');
                const mainView = document.getElementById('mainView');
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                const loginError = document.getElementById('loginError');
                const welcomeMsg = document.getElementById('welcomeMsg');
                const groupSelect = document.getElementById('group');

        const ipInput = document.getElementById('ip');
        const submitBtn = document.getElementById('submitBtn');
        const logsContainer = document.getElementById('logsContainer');
        const logsContent = document.getElementById('logsContent');

                // Check auth status on load
                checkAuth();

                async function checkAuth() {
                    try {
                        const res = await fetch('/api/user/info');
                        if (res.ok) {
                            const user = await res.json();
                            showMainView(user);
                        } else {
                            showLoginView();
                        }
                    } catch (err) {
                        showLoginView();
                    }
                }

                function showLoginView() {
                    loginView.classList.remove('hidden');
                    mainView.classList.add('hidden');
                }

                function showMainView(user) {
                    loginView.classList.add('hidden');
                    mainView.classList.remove('hidden');
                    welcomeMsg.textContent = `Logged in as ${user.username}`;

                    // Populate groups
                    groupSelect.innerHTML = '<option value="" disabled selected>Select a group</option>';
                    user.groups.forEach(g => {
                        const option = document.createElement('option');
                        option.value = g;
                        option.textContent = g;
                        groupSelect.appendChild(option);
                    });

                    // Select first group by default if available
                    if (user.groups.length > 0) {
                        groupSelect.value = user.groups[0];
                    }

                    fetchIP();
                }

                function getCookie(name) {
                    const value = `; ${document.cookie}`;
                    const parts = value.split(`; ${name}=`);
                    if (parts.length === 2) return parts.pop().split(';').shift();
                }

                async function handleLogin() {
                    const username = usernameInput.value;
                    const password = passwordInput.value;

                    if (!username || !password) {
                        loginError.textContent = "Please enter username and password";
                        loginError.style.display = 'block';
                        return;
                    }

                    try {
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRF-Token': getCookie('sgm_csrf') || ''
                            },
                            body: JSON.stringify({ username, password })
                        });

                        if (res.ok) {
                            checkAuth();
                            loginError.style.display = 'none';
                            passwordInput.value = ''; // Clear password
                        } else {
                            loginError.textContent = "Invalid credentials";
                            loginError.style.display = 'block';
                        }
                    } catch (err) {
                        loginError.textContent = "Login failed: " + err.message;
                        loginError.style.display = 'block';
                    }
                }

                async function handleLogout() {
                    await fetch('/api/logout', {
                        method: 'POST', // Changed to POST for CSRF protection
                        headers: {
                            'X-CSRF-Token': getCookie('sgm_csrf') || ''
                        }
                    });
                    checkAuth();
                }

        // Fetch IP on load
        async function fetchIP() {
            try {
                const res = await fetch('/api/ip');
                const data = await res.json();
                if (data.ip) {
                    ipInput.value = data.ip;
                    
                    // Display Geo Info if available
                    // Remove existing info div if any
                    const existingInfo = ipInput.parentNode.querySelector('.geo-info');
                    if (existingInfo) existingInfo.remove();

                    if (data.city || data.region || data.country_name || data.org) {
                        const geoInfo = [data.city, data.region, data.country_name, data.org].filter(Boolean).join(', ');
                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'geo-info';
                        infoDiv.style.marginTop = '0.5rem';
                        infoDiv.style.fontSize = '0.875rem';
                        infoDiv.style.color = '#94a3b8';
                        infoDiv.textContent = `Detected: ${geoInfo}`;
                        ipInput.parentNode.appendChild(infoDiv);
                    }
                } else {
                    ipInput.placeholder = "Failed to load IP";
                }
            } catch (err) {
                console.error(err);
                ipInput.placeholder = "Failed to load IP";
            }
        }

        async function submitUpdate() {
            const ip = ipInput.value;
            const group = groupSelect.value;
            if (!ip) {
                alert("Please enter an IP address");
                return;
            }
            if (!group) {
                alert("Please select a group");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loading"></div> Updating...';
            logsContainer.classList.remove('hidden');
            logsContent.textContent = "Starting update process...\n";

            try {
                const csrfToken = getCookie('sgm_csrf') || '';
                if (!csrfToken) {
                    logsContent.textContent += "\nError: Session expired, please refresh the page and login again.";
                    return;
                }

                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    body: JSON.stringify({ ip, group })
                });

                let data;
                try {
                    data = await res.json();
                } catch (_) {
                    if (res.status === 401 || res.status === 403) {
                        logsContent.textContent += "\nError: Session expired, please refresh the page and login again.";
                    } else {
                        logsContent.textContent += `\nError: Unexpected server response (HTTP ${res.status})`;
                    }
                    return;
                }

                if (data.logs) {
                    logsContent.textContent += data.logs;
                }

                if (data.success) {
                    logsContent.textContent += "\n\nUpdate completed successfully!";
                } else {
                    // Check if it's a permission error
                    if (res.status === 403) {
                        logsContent.textContent += `\n\nError: ${data.message || "Permission denied"}`;
                    } else {
                        logsContent.textContent += "\n\nUpdate failed or had errors. Check logs above.";
                    }
                }

            } catch (err) {
                logsContent.textContent += `\nError: ${err.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Update Rules";
            }
        }
    </script>
</body>
</html>
